<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BallRanger.io</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050b;
        }
        /* 3D 畫底層 */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* ==================================================
           【核心修正】強制覆寫 GameUI.js 製造出來的重疊面板
           ================================================== */
        #panel-main-menu {
            left: 50% !important;
            top: 35% !important;
            transform: translate(-50%, -50%) !important;
            width: 90% !important;
            max-width: 400px !important;
        }
        #panel-armory-shop {
            left: 50% !important;
            top: 78% !important;
            transform: translate(-50%, -50%) !important;
            width: 90% !important;
            max-width: 450px !important;
            max-height: 35vh !important;
        }

        /* 當遊戲開始時，強制把 GameUI 的選單藏到幕後，撕開黑布！ */
        body.game-active #panel-main-menu,
        body.game-active #panel-armory-shop {
            display: none !important;
        }

        /* 手機與 iPad 響應式微調 */
        @media (max-height: 700px) {
            #panel-armory-shop {
                top: 82% !important;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 自動監聽 GameUI.js 生出來的 START 按鈕
        document.addEventListener('DOMContentLoaded', () => {
            // 用一個定時器，不斷去網頁上抓按鈕，只要一出現就幫它綁定「撕開黑布」的機關
            const checkTimer = setInterval(() => {
                const startBtn = document.getElementById('btn-start-match');
                if (startBtn) {
                    console.log("[Master Socket] 成功攔截到 GameUI 的 START 按鈕！");
                    startBtn.addEventListener('click', () => {
                        // 給身體蓋一個章：遊戲激活了！
                        document.body.classList.add('game-active');
                        
                        // 叫醒 3D 引擎重新繪製畫面
                        setTimeout(() => {
                            window.dispatchEvent(new Event('resize'));
                        }, 150);
                    });
                    clearInterval(checkTimer); // 抓到了就停止定時器
                }
            }, 100);
        });
    </script>

    <script src="MainScene.js"></script>
    <script src="PhysicsEngine.js"></script>
    <script src="WeaponSystem.js"></script>
    <script src="GameUI.js"></script>

</body>
</html>
